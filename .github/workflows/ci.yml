name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test — Python 3.11
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check — src/ modules
        run: |
          python -m py_compile src/__init__.py
          python -m py_compile src/data_loader.py
          find src/ -name "*.py" -exec python -m py_compile {} \;

      - name: Syntax check — app/ pages
        run: |
          find app/ -name "*.py" -exec python -m py_compile {} \;

      - name: Run tests
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY || 'ci_dummy_key' }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY || 'ci_dummy_key' }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY || 'ci_dummy_key' }}
        run: |
          pytest --cov=src --cov-report=term-missing

  lint:
    name: Lint — ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        # Keep E501/E402 ignored here so CI matches Streamlit path bootstrap + long lines
        # even if pyproject.toml is not picked up (e.g. alternate repo root).
        run: ruff check src app tests --ignore E501,E402
